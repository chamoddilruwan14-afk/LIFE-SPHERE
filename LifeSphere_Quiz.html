/* STARS */

const canvas=document.getElementById("stars");
const ctx=canvas.getContext("2d");

canvas.width=innerWidth;
canvas.height=innerHeight;

let stars=[];

for(let i=0;i<200;i++){
stars.push({
x:Math.random()*canvas.width,
y:Math.random()*canvas.height,
r:Math.random()*2
});
}

function animateStars(){

ctx.clearRect(0,0,canvas.width,canvas.height);

ctx.fillStyle="white";

stars.forEach(s=>{
ctx.beginPath();
ctx.arc(s.x,s.y,s.r,0,Math.PI*2);
ctx.fill();
});

requestAnimationFrame(animateStars);
}

let current=0;
let score=0;
let xp=0;
let answered=false;

const question=document.getElementById("question");
const options=document.getElementById("options");
const explanation=document.getElementById("explanation");

function getRank(){

if(score>=95) return "LifeSphere Legend";
if(score>=85) return "Master";
if(score>=70) return "Expert";
if(score>=50) return "Scholar";
if(score>=25) return "Learner";

return "Beginner";
}

function loadQuestion(){

answered=false;

const q=quiz[current];

question.innerHTML=
`Q${current+1}. ${q.q}`;

options.innerHTML="";

explanation.style.display="none";

q.o.forEach((opt,index)=>{

const btn=document.createElement("button");

btn.className="option";

btn.innerText=opt;

btn.onclick=()=>checkAnswer(index);

options.appendChild(btn);

});

document.getElementById("qnum").innerText=
`${current+1}/${quiz.length}`;

document.getElementById("progress").style.width=
((current)/quiz.length*100)+"%";

}

function checkAnswer(selected){

if(answered)return;

answered=true;

const q=quiz[current];

const btns=
document.querySelectorAll(".option");

if(selected===q.a){

btns[selected].classList.add("correct");

score++;
xp+=50;

}else{

btns[selected].classList.add("wrong");
btns[q.a].classList.add("correct");

xp+=10;
}

document.getElementById("score").innerText=
score;

document.getElementById("xp").innerText=
xp;

document.getElementById("rank").innerText=
getRank();

explanation.innerHTML=
`
<h3>Explanation</h3>
<p>${q.e}</p>
`;

explanation.style.display="block";

}

function nextQuestion(){

if(current<quiz.length-1){

current++;
loadQuestion();

}else{

showResults();

}

}

function showResults(){

document.getElementById("quizArea").style.display="none";

document.getElementById("result").style.display="block";

const accuracy=
((score/quiz.length)*100).toFixed(1);

document.getElementById("finalScore").innerHTML=
`Score: ${score}/${quiz.length}`;

document.getElementById("accuracy").innerHTML=
`Accuracy: ${accuracy}%`;

document.getElementById("finalRank").innerHTML=
getRank();

}

loadQuestion();

</script>
